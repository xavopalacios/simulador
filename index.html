<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito | Produbanco</title>
    <!-- Google Fonts e Iconos -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <div class="brand-logos">
                <img src="produbanco.png" alt="Produbanco Logo" class="logo-main">
            </div>
            <h1>Simulador de Crédito <span>Grupo Promerica</span></h1>
        </header>

        <section class="card">
            <h2><i class="fa-solid fa-wallet"></i> Datos financieros</h2>
            <div class="input-group">
                <label for="txtIngresos">Ingresos mensuales 💵</label>
                <input type="number" id="txtIngresos" placeholder="0.00">
            </div>

            <div class="input-group">
                <label for="txtEgresos">Egresos mensuales 📉</label>
                <input type="number" id="txtEgresos" placeholder="0.00">
            </div>

            <div class="results-grid">
                <p>Disponible: <span id="spnDisponible">$0.00</span></p>
                <p>Capacidad pago: <span id="spnCapacidadPago">$0.00</span></p>
            </div>
        </section>

        <section class="card secondary">
            <h2><i class="fa-solid fa-hand-holding-dollar"></i> Solicitud de crédito</h2>
            <div class="input-group">
                <label for="txtMonto">Monto solicitado 💰</label>
                <input type="number" id="txtMonto" placeholder="Ej: 5000">
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="txtPlazo">Plazo (años) ⏳</label>
                    <input type="number" id="txtPlazo" placeholder="Ej: 3">
                </div>
                <div class="input-group">
                    <label for="txtTasaInteres">Tasa Interés % 📊</label>
                    <input type="number" id="txtTasaInteres" placeholder="12">
                </div>
            </div>

            <div class="final-summary">
                <div class="summary-item">Interés: <span id="spnInteresPagar">-</span></div>
                <div class="summary-item">Total Préstamo: <span id="spnTotalPrestamo">-</span></div>
                <div class="summary-item highlight">Cuota mensual: <span id="spnCuotaMensual">-</span></div>
            </div>

            <div class="status-box">
                <p>Estado: <span id="spnEstadoCredito">ESPERANDO DATOS...</span></p>
            </div>
        </section>

        <div class="buttons">
            <button id="btnCalcularCredito" class="btn-primary" onclick="calcular()">
                <i class="fa-solid fa-calculator"></i> Calcular
            </button>
            <button id="btnReiniciar" class="btn-secondary" onclick="limpiar()">
                <i class="fa-solid fa-rotate-right"></i> Reiniciar
            </button>
        </div>

        <footer>
            <img src="promerican.png" alt="Grupo Promerica" class="logo-group">
        </footer>
    </div>

</body>
</html>
